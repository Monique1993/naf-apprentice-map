<style>
:root {
  --teal-dark:#0f766e; --teal:#2ca6a4; --teal-light:#bfe9e3; --bg:#f7f9fc; --text:#17324d; --muted:#5d7186; --card:#ffffff; --border:#d9e3ef;
}
body { margin:0; font-family: Arial, Helvetica, sans-serif; background: var(--bg); color: var(--text); }
.wrap { max-width: 1240px; margin: 0 auto; padding: 20px; }
.header { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px 20px; margin-bottom: 16px; box-shadow: 0 2px 12px rgba(16,42,67,0.05); }
h1 { margin:0 0 8px 0; font-size: 28px; line-height: 1.15; }
.sub { color: var(--muted); font-size: 15px; line-height: 1.45; margin:0; }
.grid { display:grid; grid-template-columns: minmax(0, 1fr) 320px; gap: 16px; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; box-shadow: 0 2px 12px rgba(16,42,67,0.05); }
#map { width: 100%; height: 760px; }
.side { padding: 18px; }
.stat { border:1px solid var(--border); border-radius: 12px; padding: 14px 16px; margin-bottom: 12px; background: linear-gradient(180deg, #fff 0%, #fbfdff 100%); }
.stat .label { font-size: 12px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin-bottom: 6px; }
.stat .value { font-size: 32px; font-weight: 700; color: var(--teal-dark); }
.notes { margin-top: 16px; font-size: 13px; color: var(--muted); line-height: 1.5; }
.notes strong { color: var(--text); }
code { background:#eef4fb; padding:2px 6px; border-radius:6px; }
.small {font-size:12px; color:var(--muted); margin-top:8px;}
@media (max-width: 980px) { .grid { grid-template-columns: 1fr; } #map { height: 620px; } }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>National Apprentice Fund Interactive Map</h1>
    <p class="sub">Hover over a state to view total apprentices and industry breakdown. States with apprentices are shaded in teal, and totals are labeled directly on the map.</p>
  </div>

  <div class="grid">
    <div class="card"><div id="map"></div></div>
    <div class="card side">
      <div class="stat"><div class="label">Eligible apprentices</div><div class="value">751</div></div>
      <div class="stat"><div class="label">States + DC with data</div><div class="value">43</div></div>
      <div class="notes">
       
      </div>
    </div>
  </div>
</div>
